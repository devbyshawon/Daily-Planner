<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Planner Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#15171C;
    --surface:#1B1E25;
    --surface-2:#20242C;
    --border:#2A2E37;
    --border-soft:#23262E;
    --text:#ECEAE3;
    --text-dim:#8C8F9B;
    --text-faint:#545863;
    --mono:'JetBrains Mono',monospace;
    --sans:'Inter',sans-serif;
    --c-jobprep:#5FA8D3;
    --c-freelance:#E0A458;
    --c-thesis:#A78BFA;
    --c-skill:#6BCB77;
    --c-ielts:#EF6F6C;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;}
  .app{max-width:1180px;margin:0 auto;padding:28px 20px 60px;}

  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.18em;color:var(--text-faint);text-transform:uppercase;}
  .topbar{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px;margin-bottom:22px;}
  .date-display{font-family:var(--mono);font-size:28px;font-weight:600;letter-spacing:-0.01em;margin-top:4px;}
  .date-display .sub{font-size:13px;font-weight:400;color:var(--text-dim);margin-left:10px;}
  .nav-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .btn{font-family:var(--mono);font-size:12px;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;cursor:pointer;transition:border-color .15s,background .15s;}
  .btn:hover{border-color:#3A3F4B;background:var(--surface-2);}
  .btn.ghost{color:var(--text-dim);}
  input[type=date]{font-family:var(--mono);background:var(--surface);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-size:12px;color-scheme:dark;}

  .progress-wrap{margin-bottom:8px;}
  .commit-bar{display:flex;width:100%;height:10px;border-radius:5px;overflow:hidden;background:var(--surface);border:1px solid var(--border);}
  .segment{position:relative;height:100%;background:rgba(255,255,255,0.04);}
  .segment .fill{position:absolute;top:0;left:0;height:100%;}
  .progress-label{font-family:var(--mono);font-size:11.5px;color:var(--text-dim);margin-top:8px;}
  .progress-label b{color:var(--text);}

  .history{display:flex;gap:6px;align-items:flex-end;height:46px;margin:22px 0 26px;}
  .hist-col{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;flex:1;max-width:54px;}
  .hist-bar-track{height:30px;width:100%;display:flex;align-items:flex-end;background:var(--surface);border-radius:3px;overflow:hidden;border:1px solid var(--border-soft);}
  .hist-bar-fill{width:100%;background:var(--text-faint);transition:height .2s;}
  .hist-col.today .hist-bar-fill{background:#ECEAE3;}
  .hist-col.has-data .hist-bar-fill{background:#7C8093;}
  .hist-col.today.has-data .hist-bar-fill{background:#ECEAE3;}
  .hist-label{font-family:var(--mono);font-size:9.5px;color:var(--text-faint);}
  .hist-col.today .hist-label{color:var(--text-dim);}

  .tracks-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px;}
  .track-card{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--c);border-radius:8px;padding:14px 14px 14px;display:flex;flex-direction:column;}
  .track-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
  .track-name{font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--c);}
  .track-frac{font-family:var(--mono);font-size:11px;color:var(--text-dim);}

  /* job prep special header */
  .job-header{font-family:var(--mono);font-weight:600;font-size:14.5px;display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border-soft);}
  .jh-static{color:var(--text-dim);font-weight:500;}
  .jh-input{background:transparent;border:none;border-bottom:1px dashed transparent;color:var(--text);font-family:var(--mono);font-weight:600;font-size:14.5px;padding:1px 2px;}
  .jh-input:hover{border-bottom-color:var(--border);}
  .jh-input:focus{outline:none;border-bottom-color:var(--c);}
  .jh-day{width:28px;text-align:center;}
  .jh-topic{flex:1;min-width:100px;}

  /* generic fields */
  .field{margin-bottom:12px;}
  .field:last-child{margin-bottom:0;}
  .field-label{font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--text-faint);margin-bottom:5px;display:flex;align-items:center;justify-content:space-between;}
  .edit-btn{background:none;border:none;color:var(--text-faint);cursor:pointer;font-size:11px;opacity:0;padding:0 2px;}
  .field:hover .edit-btn{opacity:1;}
  .edit-btn:hover{color:var(--c);}

  .line-input{width:100%;background:var(--surface-2);border:1px solid var(--border-soft);border-radius:5px;color:var(--text);font-size:13px;font-family:var(--sans);padding:7px 9px;}
  .line-input:focus{outline:none;border-color:var(--text-faint);}
  .line-input::placeholder{color:var(--text-faint);}

  .rich-textarea{width:100%;min-height:64px;background:var(--surface-2);border:1px solid var(--border-soft);border-radius:5px;color:var(--text);font-size:12.5px;font-family:var(--sans);line-height:1.5;padding:8px 9px;resize:vertical;}
  .rich-textarea:focus{outline:none;border-color:var(--text-faint);}
  .rich-textarea::placeholder{color:var(--text-faint);}

  .rich-empty{font-size:12.5px;color:var(--text-faint);font-style:italic;cursor:text;padding:7px 2px;border:1px dashed var(--border-soft);border-radius:5px;}
  .rich-empty:hover{border-color:var(--text-faint);}

  .rich-display{cursor:text;border-radius:5px;padding:2px;}
  .rich-display:hover{background:var(--surface-2);}
  .check-row{display:flex;align-items:flex-start;gap:7px;padding:3px 4px;border-radius:5px;}
  .check-row:hover{background:rgba(255,255,255,0.03);}
  .num{font-family:var(--mono);font-size:11px;color:var(--text-faint);flex:none;width:16px;text-align:right;margin-top:1.5px;}
  .checkbox{flex:none;width:15px;height:15px;margin-top:1.5px;border:1.5px solid var(--text-faint);border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:10px;color:#15171C;transition:all .12s;}
  .checkbox.done{background:var(--c);border-color:var(--c);}
  .check-text{flex:1;font-size:13px;line-height:1.45;word-break:break-word;}
  .check-text.done{color:var(--text-faint);text-decoration:line-through;}
  .text-line{font-size:13px;line-height:1.5;color:var(--text-dim);padding:2px 4px;word-break:break-word;}
  .blank-line{height:6px;}
  .auto-link{color:var(--c);text-decoration:underline;text-underline-offset:2px;word-break:break-all;}

  .footer-note{margin-top:30px;font-family:var(--mono);font-size:10.5px;color:var(--text-faint);text-align:center;}

  @media (max-width:560px){
    .date-display{font-size:22px;}
    .topbar{align-items:flex-start;}
  }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div>
      <div class="eyebrow">Daily Planner Log</div>
      <div class="date-display" id="dateDisplay">—</div>
    </div>
    <div class="nav-controls">
      <button class="btn ghost" id="carryOverBtn">↻ Carry over unfinished</button>
      <button class="btn" id="prevBtn">‹</button>
      <input type="date" id="datePicker">
      <button class="btn" id="nextBtn">›</button>
      <button class="btn" id="todayBtn">Today</button>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="commit-bar" id="commitBar"></div>
    <div class="progress-label" id="progressLabel"></div>
  </div>

  <div class="history" id="history"></div>

  <div class="tracks-grid" id="tracksGrid"></div>

  <div class="footer-note">Saved automatically · Click any field to add notes, "- " for a checkable task, or paste a link</div>
</div>

<script>
// ====== CONFIG ======
const API_BASE = 'https://daily-planner-log-api.onrender.com';

const API_KEY = '5242322130c2cf788a4f6e4d0fd648039be7467d99e64a7570cfc944a4f37465';

async function apiGet(date){
  const res = await fetch(`${API_BASE}/api/logs/${date}`, { headers: { 'x-api-key': API_KEY } });
  if(!res.ok) throw new Error('fetch failed');
  const json = await res.json();
  return json.data;
}
async function apiPut(date, data){
  const res = await fetch(`${API_BASE}/api/logs/${date}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'x-api-key': API_KEY },
    body: JSON.stringify({ data })
  });
  if(!res.ok) throw new Error('save failed');
}
async function apiGetBatch(dates){
  const res = await fetch(`${API_BASE}/api/logs-batch?dates=${dates.join(',')}`, { headers: { 'x-api-key': API_KEY } });
  if(!res.ok) throw new Error('batch fetch failed');
  const json = await res.json();
  return json.results;
}

const TRACKS = [
  {
    id:'jobprep', name:'Job Prep / TaskFlow', hex:'#5FA8D3', special:'jobprep',
    fields:[
      {key:'tasks', label:'Tasks', type:'rich', placeholder:'- Install Node.js, create folder...\n- npm init -y, install dependencies...\n- Create folder structure...'}
    ]
  },
  {
    id:'freelance', name:'Freelancing', hex:'#E0A458',
    fields:[
      {key:'whatToDo', label:'What to do', type:'rich', placeholder:'e.g. Learn proposal writing + send first 2 Upwork proposals'},
      {key:'instructions', label:'Detailed Instructions', type:'rich', placeholder:'- 30 min: learn proposal strategy...\n- 30 min: send 2 proposals...'},
      {key:'deliverable', label:'Deliverable', type:'rich', placeholder:'- 2 Upwork proposals sent\n- Proposal template saved'},
      {key:'links', label:'Link & Resources', type:'rich', placeholder:'https://...'}
    ]
  },
  {
    id:'thesis', name:'Thesis — CascadeVLM', hex:'#A78BFA',
    fields:[
      {key:'readingSlot', label:'Reading slot', type:'line', placeholder:'e.g. 7–8 AM'},
      {key:'workSlot', label:'Thesis work slot', type:'line', placeholder:'e.g. 9–11 PM'},
      {key:'topic', label:'Learning Topic', type:'line', placeholder:'e.g. Knowledge Graph construction'},
      {key:'tasks', label:'Learning Tasks & Instructions', type:'rich', placeholder:'- Read paper X, sections 3-4\n- Note key formulas in sheet'},
      {key:'deliverable', label:'Deliverable', type:'rich', placeholder:'- 2-pass notes for paper X'},
      {key:'links', label:'Link & Resources', type:'rich', placeholder:'https://...'}
    ]
  },
  {
    id:'skill', name:'Skill Development', hex:'#6BCB77',
    fields:[
      {key:'topic', label:'Learning Topic', type:'line', placeholder:'e.g. React state management'},
      {key:'tasks', label:'Learning Tasks & Instructions', type:'rich', placeholder:'- Watch tutorial on useReducer\n- Refactor TaskFlow state'},
      {key:'deliverable', label:'Deliverable', type:'rich', placeholder:'- Working demo committed'},
      {key:'links', label:'Link & Resources', type:'rich', placeholder:'https://...'}
    ]
  },
  {
    id:'ielts', name:'IELTS & GRE', hex:'#EF6F6C',
    fields:[
      {key:'topic', label:'Learning Topic', type:'line', placeholder:'e.g. Writing Task 2 — Opinion essays'},
      {key:'tasks', label:'Learning Tasks & Instructions', type:'rich', placeholder:'- Study model essay structure\n- Write 1 timed essay (40 min)'},
      {key:'deliverable', label:'Deliverable', type:'rich', placeholder:'- 1 essay written + self-reviewed'},
      {key:'links', label:'Link & Resources', type:'rich', placeholder:'https://...'}
    ]
  }
];

let currentDate = new Date();
let dayData = null;
const editingState = new Set();

function fmtDate(d){ const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${day}`; }
function parseDate(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function isToday(d){ return fmtDate(d)===fmtDate(new Date()); }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function emptyTrackData(track){
  const obj={};
  if(track.id==='jobprep'){ obj.dayNum=''; obj.topic=''; }
  track.fields.forEach(f=>{ obj[f.key]=''; });
  return obj;
}
function emptyDay(){
  const t={}; TRACKS.forEach(tr=>{ t[tr.id]=emptyTrackData(tr); }); return {tracks:t};
}

function normalizeParsed(parsed){
  if(!parsed || !parsed.tracks) return emptyDay();
  TRACKS.forEach(tr=>{
    if(!parsed.tracks[tr.id] || Array.isArray(parsed.tracks[tr.id])){
      parsed.tracks[tr.id] = emptyTrackData(tr);
    } else {
      const def = emptyTrackData(tr);
      Object.keys(def).forEach(k=>{ if(parsed.tracks[tr.id][k]===undefined) parsed.tracks[tr.id][k]=''; });
    }
  });
  return parsed;
}

async function getDayData(dateStr){
  try{
    const data = await apiGet(dateStr);
    if(!data) return emptyDay();
    return normalizeParsed(data);
  }catch(e){ console.error('load failed', e); return emptyDay(); }
}
async function setDayData(dateStr, data){
  try{ await apiPut(dateStr, data); }catch(e){ console.error('save failed', e); }
}

/* ---- checklist parsing ---- */
function parseField(text){
  const lines = (text||'').split('\n');
  return lines.map((line, idx)=>{
    const m = line.match(/^-\s*\[( |x|X)\]\s?(.*)$/);
    if(m) return {type:'check', idx, checked:/x/i.test(m[1]), content:m[2]};
    if(line.trim()==='') return {type:'blank', idx};
    return {type:'text', idx, content:line};
  });
}
function normalizeField(text){
  return (text||'').split('\n').map(line=>{
    const bullet = line.match(/^[-*]\s+(?!\[[ xX]\])(.*)$/);
    if(bullet) return `- [ ] ${bullet[1]}`;
    const existing = line.match(/^-\s*\[( |x|X)\]\s?(.*)$/);
    if(existing) return `- [${/x/i.test(existing[1])?'x':' '}] ${existing[2]}`;
    return line;
  }).join('\n');
}
function fieldCounts(text){
  const lines = parseField(text);
  let total=0, done=0;
  lines.forEach(l=>{ if(l.type==='check'){ total++; if(l.checked) done++; } });
  return {total, done};
}
function autolink(escapedStr){
  return escapedStr.replace(/(https?:\/\/[^\s<]+)/g, url=>`<a href="${url}" target="_blank" rel="noopener noreferrer" class="auto-link">${url}</a>`);
}

function trackCounts(track, data){
  data = data || dayData;
  let total=0, done=0;
  if(track.id==='jobprep'){
    const c = fieldCounts(data.tracks.jobprep.tasks);
    total+=c.total; done+=c.done;
  } else {
    track.fields.forEach(f=>{
      if(f.type==='rich'){
        const c = fieldCounts(data.tracks[track.id][f.key]);
        total+=c.total; done+=c.done;
      }
    });
  }
  return {total, done};
}

/* ---- render ---- */
async function loadAndRender(){
  const dateStr = fmtDate(currentDate);
  dayData = await getDayData(dateStr);
  editingState.clear();
  renderHeader();
  renderProgress();
  renderTracks();
  renderHistory();
  document.getElementById('datePicker').value = dateStr;
}

function renderHeader(){
  const opts = {weekday:'short', month:'short', day:'numeric', year:'numeric'};
  const label = currentDate.toLocaleDateString('en-US', opts);
  document.getElementById('dateDisplay').innerHTML = label + (isToday(currentDate) ? `<span class="sub">Today</span>` : '');
}

function hexAlpha(hex, alpha){
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function renderProgress(){
  const bar = document.getElementById('commitBar');
  bar.innerHTML='';
  let totalAll=0, doneAll=0;
  TRACKS.forEach(tr=>{ const c=trackCounts(tr); totalAll+=c.total; doneAll+=c.done; });

  TRACKS.forEach(tr=>{
    const c = trackCounts(tr);
    const share = totalAll>0 ? (c.total/totalAll)*100 : (100/TRACKS.length);
    const fillPct = c.total>0 ? (c.done/c.total)*100 : 0;
    const seg = document.createElement('div');
    seg.className='segment';
    seg.style.width = share+'%';
    seg.style.background = c.total>0 ? hexAlpha(tr.hex,0.18) : 'rgba(255,255,255,0.03)';
    const fill = document.createElement('div');
    fill.className='fill';
    fill.style.width = fillPct+'%';
    fill.style.background = tr.hex;
    seg.appendChild(fill);
    bar.appendChild(seg);
  });

  const pct = totalAll>0 ? Math.round((doneAll/totalAll)*100) : 0;
  document.getElementById('progressLabel').innerHTML =
    totalAll>0 ? `<b>${doneAll}/${totalAll}</b> tasks done today · <b>${pct}%</b>` : `No tasks logged yet — fill in a field below`;
}

function renderRichDisplay(text, trackId, key){
  const lines = parseField(text);
  const nonBlank = lines.some(l=>l.type!=='blank');
  if(!nonBlank){
    return `<div class="rich-empty" data-track="${trackId}" data-key="${key}">click to add tasks, notes, or links</div>`;
  }
  let checkNum=0;
  const rows = lines.map(l=>{
    if(l.type==='check'){
      checkNum++;
      return `<div class="check-row">
        <span class="num">${checkNum}.</span>
        <div class="checkbox ${l.checked?'done':''}" data-action="toggle" data-track="${trackId}" data-key="${key}" data-line="${l.idx}">${l.checked?'✓':''}</div>
        <span class="check-text ${l.checked?'done':''}">${autolink(esc(l.content))}</span>
      </div>`;
    } else if(l.type==='text'){
      return `<div class="text-line">${autolink(esc(l.content))}</div>`;
    } else {
      return `<div class="blank-line"></div>`;
    }
  }).join('');
  return `<div class="rich-display" data-track="${trackId}" data-key="${key}">${rows}</div>`;
}

function renderTracks(){
  const grid = document.getElementById('tracksGrid');
  grid.innerHTML = '';

  TRACKS.forEach(tr=>{
    const card = document.createElement('div');
    card.className = 'track-card';
    card.style.setProperty('--c', tr.hex);
    const counts = trackCounts(tr);

    let headerHtml = `
      <div class="track-head">
        <div class="track-name">${tr.name}</div>
        <div class="track-frac">${counts.done}/${counts.total}</div>
      </div>`;

    if(tr.id==='jobprep'){
      const d = dayData.tracks.jobprep;
      const shortDate = currentDate.toLocaleDateString('en-US',{month:'short',day:'numeric'});
      headerHtml += `
        <div class="job-header">
          <span class="jh-static">Day</span>
          <input class="jh-input jh-day" data-track="jobprep" data-key="dayNum" value="${esc(d.dayNum)}" placeholder="1">
          <span class="jh-static">(${shortDate})</span>
          <span class="jh-static">—</span>
          <input class="jh-input jh-topic" data-track="jobprep" data-key="topic" value="${esc(d.topic)}" placeholder="Topic">
        </div>`;
    }

    const fieldsHtml = tr.fields.map(f=>{
      const value = dayData.tracks[tr.id][f.key] || '';
      if(f.type==='line'){
        return `
          <div class="field line-field">
            <div class="field-label">${f.label}</div>
            <input class="line-input" data-track="${tr.id}" data-key="${f.key}" value="${esc(value)}" placeholder="${esc(f.placeholder||'')}">
          </div>`;
      } else {
        const fieldId = `${tr.id}.${f.key}`;
        const editing = editingState.has(fieldId);
        let body;
        if(editing){
          body = `<textarea class="rich-textarea" data-track="${tr.id}" data-key="${f.key}" placeholder="${esc(f.placeholder||"Add notes, '- ' for a task, or paste a link")}">${esc(value)}</textarea>`;
        } else {
          body = renderRichDisplay(value, tr.id, f.key);
        }
        return `
          <div class="field rich-field">
            <div class="field-label">${f.label}<button class="edit-btn" data-track="${tr.id}" data-key="${f.key}">✎ edit</button></div>
            ${body}
          </div>`;
      }
    }).join('');

    card.innerHTML = headerHtml + fieldsHtml;
    grid.appendChild(card);
  });

  attachTrackListeners(grid);
}

function attachTrackListeners(grid){
  grid.querySelectorAll('.line-input, .jh-input').forEach(el=>{
    el.addEventListener('change', async ()=>{
      const {track, key} = el.dataset;
      dayData.tracks[track][key] = el.value;
      await setDayData(fmtDate(currentDate), dayData);
    });
  });

  grid.querySelectorAll('.edit-btn').forEach(el=>{
    el.addEventListener('click', ()=>{
      const {track, key} = el.dataset;
      editingState.add(`${track}.${key}`);
      renderTracks();
      requestAnimationFrame(()=>{
        const ta = grid.querySelector(`textarea[data-track="${track}"][data-key="${key}"]`);
        if(ta){ ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }
      });
    });
  });

  grid.querySelectorAll('.rich-empty, .rich-display').forEach(el=>{
    el.addEventListener('click', (e)=>{
      if(e.target.closest('.checkbox') || e.target.closest('a')) return;
      const {track, key} = el.dataset;
      editingState.add(`${track}.${key}`);
      renderTracks();
      requestAnimationFrame(()=>{
        const ta = grid.querySelector(`textarea[data-track="${track}"][data-key="${key}"]`);
        if(ta) ta.focus();
      });
    });
  });

  grid.querySelectorAll('[data-action="toggle"]').forEach(el=>{
    el.addEventListener('click', async (e)=>{
      e.stopPropagation();
      const {track, key, line} = el.dataset;
      const lines = dayData.tracks[track][key].split('\n');
      const idx = parseInt(line,10);
      const m = lines[idx].match(/^(-\s*\[)( |x|X)(\]\s?.*)$/);
      if(m){
        lines[idx] = m[1] + (/x/i.test(m[2]) ? ' ' : 'x') + m[3];
        dayData.tracks[track][key] = lines.join('\n');
        await setDayData(fmtDate(currentDate), dayData);
        renderProgress(); renderTracks(); renderHistory();
      }
    });
  });

  grid.querySelectorAll('.rich-textarea').forEach(el=>{
    el.addEventListener('blur', async ()=>{
      const {track, key} = el.dataset;
      dayData.tracks[track][key] = normalizeField(el.value);
      editingState.delete(`${track}.${key}`);
      await setDayData(fmtDate(currentDate), dayData);
      renderProgress(); renderTracks(); renderHistory();
    });
  });
}

async function renderHistory(){
  const hist = document.getElementById('history');
  hist.innerHTML='';
  const anchor = new Date();
  const realDays=[];
  for(let i=6;i>=0;i--){ const d=new Date(anchor); d.setDate(d.getDate()-i); realDays.push(d); }

  const dateStrs = realDays.map(fmtDate);
  let batch = {};
  try{ batch = await apiGetBatch(dateStrs); }catch(e){ console.error('history load failed', e); }

  realDays.forEach((d,i)=>{
    const dateStr = dateStrs[i];
    const data = normalizeParsed(batch[dateStr] || null);
    let total=0, done=0;
    TRACKS.forEach(tr=>{ const c=trackCounts(tr, data); total+=c.total; done+=c.done; });
    const pct = total>0 ? (done/total) : 0;
    const col = document.createElement('div');
    col.className = 'hist-col' + (fmtDate(d)===fmtDate(currentDate)?' today':'') + (total>0?' has-data':'');
    col.innerHTML = `
      <div class="hist-bar-track"><div class="hist-bar-fill" style="height:${Math.max(pct*100,total>0?6:0)}%"></div></div>
      <div class="hist-label">${d.getDate()}</div>
    `;
    col.addEventListener('click', ()=>{ currentDate = new Date(d); loadAndRender(); });
    hist.appendChild(col);
  });
}

document.getElementById('prevBtn').addEventListener('click', ()=>{ currentDate.setDate(currentDate.getDate()-1); loadAndRender(); });
document.getElementById('nextBtn').addEventListener('click', ()=>{ currentDate.setDate(currentDate.getDate()+1); loadAndRender(); });
document.getElementById('todayBtn').addEventListener('click', ()=>{ currentDate = new Date(); loadAndRender(); });
document.getElementById('datePicker').addEventListener('change', (e)=>{ if(e.target.value){ currentDate = parseDate(e.target.value); loadAndRender(); } });

document.getElementById('carryOverBtn').addEventListener('click', async ()=>{
  const yesterday = new Date(currentDate);
  yesterday.setDate(yesterday.getDate()-1);
  const prev = await getDayData(fmtDate(yesterday));

  TRACKS.forEach(tr=>{
    const richKeys = tr.fields.filter(f=>f.type==='rich').map(f=>f.key);
    richKeys.forEach(key=>{
      const prevLines = parseField(prev.tracks[tr.id][key]);
      const todayLines = parseField(dayData.tracks[tr.id][key]);
      const todayContents = new Set(todayLines.filter(l=>l.type==='check').map(l=>l.content.trim()));
      const toAdd = prevLines.filter(l=>l.type==='check' && !l.checked && !todayContents.has(l.content.trim()));
      if(toAdd.length){
        let cur = dayData.tracks[tr.id][key] || '';
        toAdd.forEach(l=>{ cur += (cur && !cur.endsWith('\n') ? '\n' : '') + `- [ ] ${l.content}`; });
        dayData.tracks[tr.id][key] = cur;
      }
    });
  });

  await setDayData(fmtDate(currentDate), dayData);
  renderProgress(); renderTracks(); renderHistory();
});

loadAndRender();
</script>
</body>
</html>
